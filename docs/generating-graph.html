<script>
(function () {
  const viewport = document.getElementById('gg-viewport');
  const world = document.getElementById('gg-world');
  const svg = world.querySelector('svg');
  const vb = svg.viewBox.baseVal;
  const W = vb.width, H = vb.height;
  svg.setAttribute('width', W); svg.setAttribute('height', H);
  let s = 1, x = 0, y = 0;
  const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
  function apply() { world.style.transform = `translate(${x}px, ${y}px) scale(${s})`; }
  function smooth(fn) {
    world.classList.add('gg-smooth');
    fn(); apply();
    setTimeout(() => world.classList.remove('gg-smooth'), 200);
  }
  function fit() {
    const r = viewport.getBoundingClientRect();
    s = clamp(Math.min(r.width / W, r.height / H) * 0.96, 0.05, 10);
    x = (r.width - W * s) / 2; y = (r.height - H * s) / 2;
  }
  function zoomAt(cx, cy, factor) {
    const ns = clamp(s * factor, 0.1, 12);
    const k = ns / s;
    x = cx - k * (cx - x); y = cy - k * (cy - y); s = ns;
  }
  viewport.addEventListener('wheel', (e) => {
    e.preventDefault();
    const r = viewport.getBoundingClientRect();
    zoomAt(e.clientX - r.left, e.clientY - r.top, Math.pow(1.0015, -e.deltaY));
    apply();
  }, { passive: false });
  let drag = null;
  viewport.addEventListener('pointerdown', (e) => {
    if (e.button !== 0) return;
    drag = { px: e.clientX, py: e.clientY, ox: x, oy: y, moved: false };
    viewport.classList.add('gg-dragging');
    viewport.setPointerCapture(e.pointerId);
  });
  viewport.addEventListener('pointermove', (e) => {
    if (!drag) return;
    const dx = e.clientX - drag.px, dy = e.clientY - drag.py;
    if (Math.abs(dx) + Math.abs(dy) > 3) drag.moved = true;
    x = drag.ox + dx; y = drag.oy + dy; apply();
  });
  function endDrag(e) { if (!drag) return; drag = null; viewport.classList.remove('gg-dragging'); }
  viewport.addEventListener('pointerup', endDrag);
  viewport.addEventListener('pointercancel', endDrag);
  viewport.addEventListener('dblclick', (e) => {
    const r = viewport.getBoundingClientRect();
    smooth(() => zoomAt(e.clientX - r.left, e.clientY - r.top, 1.6));
  });
  document.getElementById('gg-in').addEventListener('click', () => {
    const r = viewport.getBoundingClientRect();
    smooth(() => zoomAt(r.width / 2, r.height / 2, 1.35));
  });
  document.getElementById('gg-out').addEventListener('click', () => {
    const r = viewport.getBoundingClientRect();
    smooth(() => zoomAt(r.width / 2, r.height / 2, 1 / 1.35));
  });
  document.getElementById('gg-fit').addEventListener('click', () => smooth(fit));
  document.getElementById('gg-100').addEventListener('click', () => smooth(() => {
    const r = viewport.getBoundingClientRect();
    s = 1; x = (r.width - W) / 2; y = Math.max(12, (r.height - H) / 2);
  }));
  window.addEventListener('resize', () => { fit(); apply(); });
  fit(); apply();
})();
</script>
