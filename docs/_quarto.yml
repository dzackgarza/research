project:
  type: book
  output-dir: _site
  resources:
  - data/**
book:
  title: Lattice Research
  repo-url: https://github.com/dzackgarza/research
  site-url: https://dzackgarza.github.io/research/
  search: true
  chapters:
  - index.md
  - part: Mathematics
    chapters:
    - Mathematical-Definitions.md
    - Categorical-Foundations.md
    - Settled-Mathematical-Rulings.md
    - Categorical-Presentation-Principles.md
    - Mathematical-Lexicon.md
  - part: Sage Reference
    chapters:
    - Sage-Category-Framework-Inventory.md
    - Sage-Category-Classes.md
  - part: Doctrine
    chapters:
    - Mathematical-Language-Style-Guide.md
    - Contribution-Guidelines.md
    - Design-Hazard-Ledger.md
    - Lean-Sage-Integration-Model.md
  - Roadmap.md
bibliography:
- references.bib
- refs-web.bib
link-citations: true
number-sections: true
crossref:
  chapters: true
format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    html-math-method: mathjax
    code-copy: true
    smooth-scroll: true
filters:
- stacks-tags.lua
