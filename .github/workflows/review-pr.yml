name: PR Review
on:
  pull_request: {}
jobs:
  deterministic-diff:
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@main
    permissions:
      contents: read
    with:
      gate: deterministic-diff
      profile: 'sage'
  delegation-conformance:
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@main
    permissions:
      contents: read
    with:
      gate: delegation-conformance
      profile: 'sage'
  qc-doctor:
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@main
    permissions:
      contents: read
      actions: read
      # Label-alignment check reads live labels via `gh label list`
      # (GET /repos/{owner}/{repo}/labels), which requires Issues (read).
      issues: read
    with:
      gate: qc-doctor
      profile: 'sage'
  pr-description-checklist:
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@main
    permissions:
      contents: read
      pull-requests: read
    with:
      gate: pr-description-checklist
      profile: 'sage'
  general:
    uses: dzackgarza/ai-review-ci/.github/workflows/_review.yml@main
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
    with:
      report_type: general
      scope: diff
  slop:
    uses: dzackgarza/ai-review-ci/.github/workflows/_review.yml@main
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
    with:
      report_type: slop
      scope: diff
  thread-resolution:
    needs:
      - general
      - slop
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@main
    permissions:
      contents: read
      pull-requests: read
    with:
      gate: thread-resolution
      profile: 'sage'
