name: docs
'on':
  push:
    branches:
      - main
    paths:
      - docs/**
      - .github/workflows/docs.yml
  workflow_dispatch: null
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: quarto-dev/quarto-actions/setup@v2
      - name: Fetch shared bibliography
        run: curl -sSL https://raw.githubusercontent.com/dzackgarza/pandoc-config/main/bib/references.bib
          -o docs/references.bib
      - run: python3 scripts/docs_check.py
        name: Render + integrity gate
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
