# Repo-owned configuration: edit triggers (cron, branches) and `with:` values
# directly. All review behavior lives upstream in the referenced workflow.
#
# Advisory only: findings are published as fingerprint-tracked issues
# (labels `ai-review`, `ai-review/slop`, sub-issues of the grouping issue
# below) and never fail the run. Triage happens on the issues — fix, or
# close with a reason; closed findings become do-not-re-raise context for
# later reviewers and automation never re-creates or closes them. Review
# context comes from review-packet.tar, assembled by `just review-packet`.
name: Slop Review

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 4'
  push:
    branches: [main]

jobs:
  slop:
    uses: dzackgarza/ai-review-ci/.github/workflows/_review.yml@main
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
      issues: write
    with:
      report_type: slop
      scope: repo
      advisory: true
      context_archive: review-packet.tar
      delivery: issues
      parent_issue: 103
