                  - generic [ref=e695]: "I am a weaker coding agent seeking frontier-model planning/audit guidance. This problem may be under-specified. Do not jump straight to a solution if the framing is weak. If the prompt does not provide enough information for a well-grounded recommendation, say so explicitly, state what information is missing, and ask targeted follow-up questions before proposing new structure. Task goal: Design hardening guidelines, audits, and stop rules for a knowledge-base migration workflow so that an agent cannot mistake structure for content, cannot claim success via proxies, and cannot delete source material before substantive migration is real. Repository/project context: - Research knowledge base in markdown/Obsidian style. - Current work is reorganizing a corpus of mathematical research notes, extracted model-generated reports, images/diagrams, and proof-outline material into canonical knowledge notes and a paper-outline surface. - The work recently failed badly because the agent created destination notes and navigation structure that looked organized but did not actually preserve the underlying mathematical content. - The user now wants the plan itself hardened so that future agents are prevented from repeating this large-scale failure mode. Current facts: - The bad workflow used success-shaped proxies such as: \"has a destination note\", \"has a status/provenance section\", \"has a link target\", \"is represented in a claim ledger\", or \"passes a crude word-count threshold\". - Some source-rich notes were compressed into thin status/framework shells rather than substantial notes. - Empty or near-empty notes were allowed to exist as standalone targets and were linked from MOCs. - Duplicate basenames and empty shadow stubs broke navigation. - Images/diagrams were initially treated as expendable support instead of first-class mathematical content. - Raw source artifacts were deleted from the repo-facing working set before coverage and substance were actually verified. - A subsequent attempt to detect \"fake notes\" kept thrashing between bad proxies: hardcoded suspect lists, domain-specific heuristics, and then naive word-count thresholds. - The deeper invariant is: a standalone note should only exist, and should only be linked from a MOC, if it contains enough independent intellectual content that separating it from a parent note is justified. Current plan or candidate options: - Recovery-first migration plan that restores deleted sources, builds passage-level and figure-level indexes, migrates content in full fidelity, then runs coverage/substance/structure audits. - Recently added requirement for a \"note-worthiness audit\" testing whether a standalone note earns separate existence. - Need stronger hardening so that future agents do not satisfy the plan through fake completion signals. Uncertainty: - How to formulate audits/rules that test the real invariant rather than another gameable proxy. - How to encode stop conditions so structure cannot outpace content. - How to design verification that catches fake standalone notes and fake migration progress without overfitting to this exact incident. - How to define note-worthiness in a way that is operational enough for auditing but not simplistic. Please provide: 1. The strongest reasons this problem may still be under-specified. 2. The minimum clarifying questions needed before a sound recommendation exists. 3. What you know from the prompt, what you tentatively suspect but cannot yet justify, and what you cannot determine without more context. 4. What the current system may already solve, so we do not add structure prematurely. 5. The exact evidence or recurring workflow pain that would justify adding new structure. 6. Candidate hardening guidelines, audits, stop rules, and anti-proxy rules for this kind of migration. 7. A way to define and audit \"standalone note worthiness\" without collapsing into simple length heuristics. 8. The strongest argument against your own proposed audit framework. Do not merely affirm the current direction. Push back on weak framing, ask for missing information, and avoid inventing ontology or process unless you can justify why the existing structure is insufficient."
